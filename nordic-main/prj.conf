# Zephyr Kernel Configuration for XIAO nRF52840 Sense - nordic-main (Handy BLE)

CONFIG_MAIN_STACK_SIZE=4096

# Heap (BLE stack + MCUmgr + audio needs memory)
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Logging and console (USB CDC ACM on XIAO nRF52840)
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=n
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# USB CDC ACM console
CONFIG_USB_CDC_ACM=y

# Peripherals
CONFIG_GPIO=y
CONFIG_PINCTRL=y

# Audio (PDM microphone)
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

# Bluetooth Low Energy
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_SMP=n
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_DEVICE_NAME="HarnessNode"
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_NAME_MAX=20
CONFIG_BT_GATT_CLIENT=y

# BLE MTU (OTA transfer efficiency + audio throughput)
CONFIG_BT_L2CAP_TX_MTU=244
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_L2CAP_TX_BUF_COUNT=4
CONFIG_BT_ATT_TX_COUNT=4
CONFIG_BT_CONN_TX_MAX=4

# MCUmgr (SMP server for BLE OTA)
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_BT=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_IMG_VERBOSE_ERR=y
CONFIG_MCUBOOT_IMGTOOL_SIGN_VERSION="0.0.1+0"
CONFIG_MCUMGR_GRP_OS=y

# MCUmgr dependencies
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y

# Settings persistence (image confirm state survives reboot)
CONFIG_SETTINGS=y
CONFIG_SETTINGS_FCB=y
CONFIG_FCB=y

# Watchdog timer
CONFIG_WATCHDOG=y

# Hardware info (read reset cause)
CONFIG_HWINFO=y

# I2C + IMU（LSM6DS3TR-C）
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_LSM6DSL=y
CONFIG_LSM6DSL_TRIGGER_GLOBAL_THREAD=y

# Battery monitoring
CONFIG_ADC=y
CONFIG_BT_BAS=y
CONFIG_NRFX_POWER=y
