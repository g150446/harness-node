# MCUboot board config for XIAO nRF52840 Sense

# Standard nRF52840 internal flash driver
CONFIG_FLASH=y

# Support large application images
CONFIG_BOOT_MAX_IMG_SECTORS=256

# Disable USB in MCUboot (not needed, saves space)
CONFIG_USB_DEVICE_STACK=n

# Disable watchdog feeding
CONFIG_BOOT_WATCHDOG_FEED=n

# Stack protection not needed in MCUboot
CONFIG_HW_STACK_PROTECTION=n
