# Zephyr Kernel Configuration for Voice Bridge BLE
# nRF54L15 Sense - BLE with PDM Microphone

# General System
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=49152
CONFIG_SYS_CLOCK_TICKS_PER_SEC=32768

# Logging & Console
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=n
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

# Bluetooth Low Energy
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_MAX_CONN=2
CONFIG_BT_SMP=n
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_DEVICE_NAME="VoiceBridge"
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_NAME_MAX=20

# GATT client (for MTU exchange)
CONFIG_BT_GATT_CLIENT=y

# MTU extension for audio throughput
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# Multiple TX buffers for throughput
CONFIG_BT_L2CAP_TX_BUF_COUNT=10
CONFIG_BT_ATT_TX_COUNT=10
CONFIG_BT_CONN_TX_MAX=10

# GPIO
CONFIG_GPIO=y
CONFIG_GPIO_NRFX=y

# PDM Microphone (DMIC)
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y
CONFIG_PINCTRL=y
