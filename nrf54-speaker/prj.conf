# Zephyr Kernel Configuration for XIAO nRF54L15 Sense speaker + motion detection

CONFIG_MAIN_STACK_SIZE=4096

# Heap (BLE stack + MCUmgr + I2S audio thread)
CONFIG_HEAP_MEM_POOL_SIZE=81920
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Logging and console
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=n
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_CBPRINTF_FP_SUPPORT=y
# Interrupt-driven UART enables RX so uart_poll_in() works for 'p' command
CONFIG_UART_INTERRUPT_DRIVEN=y

# Peripherals
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SENSOR=y

# I2S driver for MAX98357A audio output
CONFIG_I2S=y

# Onboard LSM6DS3TR-C uses Zephyr's LSM6DSL-compatible driver
CONFIG_LSM6DSL=y
CONFIG_LSM6DSL_TRIGGER_GLOBAL_THREAD=y

# Bluetooth Low Energy
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_SMP=n
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_DEVICE_NAME="SpeakerBridge"
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_NAME_MAX=20
CONFIG_BT_GATT_CLIENT=y

# BLE MTU拡張 (OTA転送効率のため)
CONFIG_BT_L2CAP_TX_MTU=244
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_L2CAP_TX_BUF_COUNT=4
CONFIG_BT_ATT_TX_COUNT=4
CONFIG_BT_CONN_TX_MAX=4

CONFIG_PINCTRL=y

# MCUmgr (SMP server)
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_BT=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y

# MCUmgr依存
CONFIG_IMG_MANAGER=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_NRFX_RRAMC=n
CONFIG_NRF_RRAM_READYNEXT_TIMEOUT_VALUE=0
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y

# 設定の永続化 (image confirm状態をreboot後も保持)
CONFIG_SETTINGS=y
CONFIG_SETTINGS_FCB=y
CONFIG_FCB=y
