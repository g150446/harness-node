# Partition Manager static configuration for XIAO nRF54L15
#
# RRAMC can protect up to 62 KB (2 x 31 KB combined regions).
# MCUboot is sized to 62 KB (0xF800) so fprotect_area() succeeds.
# mcuboot_primary starts at 0xF800; after the 2 KB pad the app code
# is still at 0x10000 (same link address as before).
#
# flash_primary layout (0x165000 = 1.5 MB total):
#   0x000000  mcuboot          62 KB  (RRAMC-protected)
#   0x00F800  mcuboot_pad      2 KB   ─┐ mcuboot_primary (324 KB)
#   0x010000  app [PM-placed, ~322 KB] ─┘
#   0x060800  EMPTY_gap        2 KB   (align to slot0_ns @ 0x61000)
#   0x061000  EMPTY_0 (slot0_ns)   324 KB
#   0x0b2000  mcuboot_secondary    324 KB  ← OTA slot
#   0x103000  EMPTY_1              356 KB  (slot1_ns + reserved)
#   0x15c000  settings_storage     36 KB
#   0x165000  end

mcuboot:
  address: 0x0
  region: flash_primary
  size: 0xf800

mcuboot_pad:
  address: 0xf800
  region: flash_primary
  size: 0x800

# mcuboot_primary spans pad + app; PM generates PM_mcuboot_primary_ID
mcuboot_primary:
  orig_span: &id001
  - mcuboot_pad
  - app
  span: *id001
  address: 0xf800
  region: flash_primary
  size: 0x51000

EMPTY_gap:
  address: 0x60800
  region: flash_primary
  size: 0x800

EMPTY_0:
  address: 0x61000
  region: flash_primary
  size: 0x51000

mcuboot_secondary:
  address: 0xb2000
  region: flash_primary
  size: 0x51000

EMPTY_1:
  address: 0x103000
  region: flash_primary
  size: 0x59000

settings_storage:
  address: 0x15c000
  region: flash_primary
  size: 0x9000
