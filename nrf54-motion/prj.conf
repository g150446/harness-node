# Zephyr Kernel Configuration for XIAO nRF54L15 Sense motion detection

CONFIG_MAIN_STACK_SIZE=3072

# Heap (BLE stack needs memory)
CONFIG_HEAP_MEM_POOL_SIZE=16384

# Logging and console
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=n
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# Peripherals
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SENSOR=y

# Onboard LSM6DS3TR-C uses Zephyr's LSM6DSL-compatible driver
CONFIG_LSM6DSL=y
CONFIG_LSM6DSL_TRIGGER_GLOBAL_THREAD=y

# Bluetooth Low Energy
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_SMP=n
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_DEVICE_NAME="MotionBridge"
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_NAME_MAX=20
CONFIG_BT_GATT_CLIENT=y

# MTU / バッファ（モーションは小パケットなので最小限）
CONFIG_BT_L2CAP_TX_MTU=23
CONFIG_BT_BUF_ACL_RX_SIZE=27
CONFIG_BT_BUF_ACL_TX_SIZE=27
CONFIG_BT_CTLR_DATA_LENGTH_MAX=27
CONFIG_BT_L2CAP_TX_BUF_COUNT=4
CONFIG_BT_ATT_TX_COUNT=4
CONFIG_BT_CONN_TX_MAX=4

CONFIG_PINCTRL=y
