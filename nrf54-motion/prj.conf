# Zephyr Kernel Configuration for XIAO nRF54L15 Sense motion detection

CONFIG_MAIN_STACK_SIZE=3072

# Logging and console
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=n
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# Peripherals
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SENSOR=y

# Onboard LSM6DS3TR-C uses Zephyr's LSM6DSL-compatible driver
CONFIG_LSM6DSL=y
CONFIG_LSM6DSL_TRIGGER_GLOBAL_THREAD=y
