# Zephyr Kernel Configuration for Voice Bridge BLE
# NCS v2.9.2 compatible - minimal config

# General
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=49152

# Logging
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=n
CONFIG_LOG_DEFAULT_LEVEL_INFO=y

# Console
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Bluetooth Low Energy
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_MAX_CONN=2
CONFIG_BT_SMP=n

# GPIO
CONFIG_GPIO=y
CONFIG_GPIO_NRFX=y

# Timer
CONFIG_SYS_CLOCK_TICKS_PER_SEC=32768

# Printk
CONFIG_PRINTK=y

# Allow warnings
CONFIG_WARNINGS_ARE_ERRORS=n
